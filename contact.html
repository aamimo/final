<section id="contact" class="contact-sec">
  <div class="container contact-grid">
    <div>
      <span class="section-eyebrow">Contact</span>
      <h2 class="section-title">Let's create change together.</h2>
      <p style="margin-top:1rem;color:var(--muted-fg);">For partnerships, bookings or general inquiries, reach out to Vincent Kenvin and the Wasanii Sanaa team.</p>
      <div style="margin-top:2rem;display:flex;flex-direction:column;gap:1rem;">
        <a href="tel:+254713844890" class="contact-card"><div class="label">Phone</div><div class="value">+254 713 844 890</div></a>
        <a href="mailto:wasaniisanaa@gmail.com" class="contact-card"><div class="label">Email</div><div class="value">wasaniisanaa@gmail.com</div></a>
        <div class="contact-card"><div class="label">Headquarters</div><div class="value">Kibera, Nairobi, Kenya</div></div>
      </div>
    </div>
    <form id="contactForm" class="contact-form">
      <h3>Send us a message</h3>
      <div class="field"><label for="name">Name</label><input id="name" name="name" required /></div>
      <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" required /></div>
      <div class="field"><label for="message">Message</label><textarea id="message" name="message" rows="5" required></textarea></div>
      <button type="submit">Send Message</button>
    </form>
  </div>
</section>
